<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container py-5">

        <h2 class="text-center mb-4">Seat Layout</h2>

        
        <div class="d-flex justify-content-center gap-3 mb-4">
            <button class="btn btn-primary" onclick="coach1()">Coach 1</button>
            <button class="btn btn-success" onclick="coach2()">Coach 2</button>
            <button class="btn btn-warning text-dark" onclick="coach3()">Coach 3</button>
            <button class="btn btn-danger" onclick="coach4()">Coach 4</button>
        </div>
        <div id="seatLayout" class="text-center"></div>


    </div>

    <form class="form-control" method="get" action="index.html"  accept="">
        
        <label>First Name</label>
        <input id="first_name" type="text" onkeydown="" name="first_name" placeholder="Enter your name">
        <div id="feedback"></div>
        <label>Address</label>
        <textarea name="address" rows="5" cols="20"></textarea>

        <label>Gender</label>
        <input id="Male" type="radio" name="gender" value="Male"><label for="Male">Male</label>
        <input id="Female" type="radio" name="gender" value="Female"><label for="Female">Female</label>

        <label>Documents checklist</label>
        <input id="ID" type="checkbox" name="id" value="id"><label for="ID">ID Card</label>
        <input id="Matric" type="checkbox" name="id" value="Matric"><label for="Matric">Matric</label>
        <input id="FSC" type="checkbox" name="id" value="FSC"><label for="FSC">FSC</label>
        <input id="BS" type="checkbox" name="id" value="BS"><label for="BS">BS</label>

        <input type="file" accept=".png">

        <select name="skills">
            <option value="Programming">Programming</option>
            <option value="Design">Design</option>
            <option value="Marketing">Marketing</option>
        </select>

        <button type="submit">Submit</button>
    </form>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    
    <script src="script.js"></script>
<script>
    const form = document.querySelector('form');
    form.addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent the default form submission

        // Perform your validation logic here
        const firstName = document.getElementById('first_name');
        const feedback = document.getElementById('feedback');

        if (firstName.value.trim() === '') {
            feedback.textContent = 'First name is required.';
            feedback.style.color = 'red';
            firstName.focus();
            firstName.style.borderColor = 'red';

        } else {
            feedback.textContent = '';
            // You can submit the form or perform other actions here
            alert('Form submitted successfully!');
        }

    });
</script>
</body>
</html>
